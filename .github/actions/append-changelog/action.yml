name: 'Append to system-wide deploy changelog'
description: 'Writes a deploy-event JSON to s3://alpha-engine-research/changelog/ for cross-repo deploy + event provenance, including PR body for downstream event mining.'

# Per the system-wide-changelog preference (memory: preference_alpha_engine_deploy_changelog.md):
# every successful deploy across any alpha-engine* repo emits one JSON object to S3.
# A daily aggregator cron (aggregate-changelog.yml in this repo) materializes
# them into a Markdown view. Race-free because each entry has a unique
# timestamped S3 key.
#
# As of the event-mining enrichment (2026-05-01): action ALSO fetches the PR
# body via the GitHub API and embeds it in the entry. PR bodies carry the
# actual problem statement + solution rationale — the data Brian needs to
# answer "what problems did we face and how did we solve them" months later.
#
# As of the schema-discipline arc PR 2 (2026-05-01 evening): action emits
# a structured entry to changelog/entries/{YYYY-MM-DD}/{event_id}.json
# (schema 1.0.0: event_type=change, subsystem inferred from repo,
# resolution_type, detected_at/resolved_at/verified_at timestamps,
# git_refs, auto_emitted=true). Aggregator reads entries/ exclusively.
#
# Legacy dual-write to changelog/deploys/ retired 2026-05-07 after the
# 1-week back-compat bake (per CLAUDE.md S3 contract). Historical
# changelog/deploys/ objects remain in S3 for retroactive queries.
#
# Caller pattern:
#   - uses: nousergon/nousergon-docs/.github/actions/append-changelog@main
#     with:
#       deploy_status: success     # or failure / merged
#     # implicit context (repo, sha, ref, pr_number, pr_body) comes from github.* env

inputs:
  deploy_status:
    description: 'success | failure | merged. Use "merged" for repos where a push-to-main IS the deploy (no separate build/deploy step).'
    required: true
    default: 'success'
  pr_number:
    description: 'PR number that landed this deploy. Optional — auto-derived from commit message when push event.'
    required: false
    default: ''
  pr_title:
    description: 'PR title. Optional — auto-derived from first line of commit message when push event.'
    required: false
    default: ''
  pr_body:
    description: 'Full PR body. Optional — auto-fetched via gh api when pr_number is known.'
    required: false
    default: ''
  deploy_workflow:
    description: 'Name of the workflow that triggered this entry (e.g. deploy.yml, deploy-infrastructure.yml).'
    required: false
    default: ''
  s3_bucket:
    description: 'Override S3 bucket. Default: alpha-engine-research.'
    required: false
    default: 'alpha-engine-research'
  structured_prefix:
    description: 'Override S3 key prefix for the structured entry. Default: changelog/entries.'
    required: false
    default: 'changelog/entries'
  subsystem:
    description: 'Override subsystem (controlled-vocab field). Default: derived from repo via the mapping in the action body.'
    required: false
    default: ''
  resolution_type:
    description: 'Override resolution_type (controlled-vocab field). Default: code_fix. Use dependency_update for pin-bump deploys, etc.'
    required: false
    default: 'code_fix'

runs:
  using: 'composite'
  steps:
    - name: Build entry + put to S3
      shell: bash
      env:
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        REF: ${{ github.ref_name }}
        ACTOR: ${{ github.actor }}
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        PR_TITLE_INPUT: ${{ inputs.pr_title }}
        PR_BODY_INPUT: ${{ inputs.pr_body }}
        DEPLOY_STATUS: ${{ inputs.deploy_status }}
        DEPLOY_WORKFLOW: ${{ inputs.deploy_workflow }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
        STRUCTURED_PREFIX: ${{ inputs.structured_prefix }}
        SUBSYSTEM_OVERRIDE: ${{ inputs.subsystem }}
        RESOLUTION_TYPE: ${{ inputs.resolution_type }}
        WORKFLOW_RUN_ID: ${{ github.run_id }}
        WORKFLOW_NAME: ${{ github.workflow }}
        # GH_TOKEN: GitHub auto-provides this for `gh api` calls; the default
        # GITHUB_TOKEN's contents:read scope is sufficient for /pulls/{n} on
        # the same repo. No secret to wire.
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        TS_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        TS_KEY=$(date -u +%Y/%m/%dT%H-%M-%S)
        REPO_SHORT="${REPO#*/}"
        SHA7="${SHA:0:7}"

        # Derive PR number / title from the merge-commit message when not
        # passed explicitly. Squash + merge-commit + rebase strategies all
        # tend to produce "<title> (#<number>)" in the first line — match that.
        if [[ -z "${PR_NUMBER_INPUT}" || -z "${PR_TITLE_INPUT}" ]]; then
          MSG=$(git log -1 --pretty=%s "${SHA}" 2>/dev/null || echo "")
        else
          MSG=""
        fi

        if [[ -z "${PR_NUMBER_INPUT}" ]]; then
          PR_NUMBER=$(echo "${MSG}" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
        else
          PR_NUMBER="${PR_NUMBER_INPUT}"
        fi

        if [[ -z "${PR_TITLE_INPUT}" ]]; then
          PR_TITLE=$(echo "${MSG}" | sed 's/ *(#[0-9]*) *$//')
        else
          PR_TITLE="${PR_TITLE_INPUT}"
        fi

        # PR body — the actual problem-statement + solution-rationale text
        # we need for retro / event mining. Fetch via gh api when number is
        # known and not explicitly passed. Best-effort: failures fall back
        # to empty string rather than blocking the deploy log.
        PR_BODY="${PR_BODY_INPUT}"
        if [[ -z "${PR_BODY}" && -n "${PR_NUMBER:-}" ]]; then
          PR_BODY=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""' 2>/dev/null || echo "")
        fi

        # Files-changed count. Shallow checkouts (default fetch-depth=1) often
        # lack the parent commit, in which case git diff-tree fails. The
        # earlier `... | wc -l | tr -d ' ' || echo 0` form double-emitted
        # under set -o pipefail — pipeline produced "0" + fallback echo
        # produced "0", capturing as "0\n0" → invalid JSON for --argjson.
        # Gate on parent-availability instead so the path is unambiguous.
        FILES_CHANGED=0
        if git rev-parse --quiet --verify "${SHA}^" >/dev/null 2>&1; then
          FILES_CHANGED=$(git diff-tree --no-commit-id --name-only -r "${SHA}" 2>/dev/null | wc -l | tr -d ' ')
          FILES_CHANGED=${FILES_CHANGED:-0}
        fi

        # Repo → subsystem mapping (controlled-vocab field for the
        # structured entry). Update when a new module repo lands.
        # Aligns with the module taxonomy in CLAUDE.md.
        # Both pre- and post-rename short-names are listed so historical
        # backfill data (old names) and live events (new names) both resolve.
        case "${REPO_SHORT}" in
          alpha-engine|crucible-executor)              DERIVED_SUBSYSTEM="executor" ;;
          alpha-engine-research|crucible-research)      DERIVED_SUBSYSTEM="research" ;;
          alpha-engine-predictor|crucible-predictor)    DERIVED_SUBSYSTEM="predictor" ;;
          alpha-engine-data|nousergon-data)             DERIVED_SUBSYSTEM="data_pipeline" ;;
          alpha-engine-backtester|crucible-backtester)  DERIVED_SUBSYSTEM="backtester" ;;
          alpha-engine-dashboard|crucible-dashboard)    DERIVED_SUBSYSTEM="dashboard" ;;
          alpha-engine-config)                          DERIVED_SUBSYSTEM="infrastructure" ;;
          alpha-engine-docs|nousergon-docs)             DERIVED_SUBSYSTEM="infrastructure" ;;
          alpha-engine-lib|nousergon-lib)               DERIVED_SUBSYSTEM="infrastructure" ;;
          alpha-engine-evaluator|crucible-evaluator)    DERIVED_SUBSYSTEM="infrastructure" ;;
          mnemon)                                       DERIVED_SUBSYSTEM="infrastructure" ;;
          flow-doctor)                                  DERIVED_SUBSYSTEM="telemetry" ;;
          *)                                            DERIVED_SUBSYSTEM="infrastructure" ;;
        esac
        SUBSYSTEM="${SUBSYSTEM_OVERRIDE:-${DERIVED_SUBSYSTEM}}"

        # Structured event_id matches the changelog-log CLI scheme so
        # legacy + structured entries are joinable on (ts + author + summary).
        TS_ID="${TS_UTC//:/-}"
        TS_ID="${TS_ID%Z}"
        DIGEST_INPUT="${TS_UTC}|${ACTOR}|${PR_TITLE}"
        EVENT_HASH=$(printf '%s' "${DIGEST_INPUT}" | shasum -a 1 | cut -c1-7)
        EVENT_ID="${TS_ID}_${REPO_SHORT}_${EVENT_HASH}"
        ENTRY_DATE="${TS_UTC:0:10}"

        # Status → deploy event interpretation:
        #   success / merged → event_type=change (it shipped, system state changed)
        #   failure          → event_type=incident (deploy job failed)
        if [[ "${DEPLOY_STATUS}" == "failure" ]]; then
          STRUCTURED_EVENT_TYPE="incident"
          STRUCTURED_SEVERITY="medium"
          ROOT_CAUSE_CATEGORY="infrastructure_failure"
        else
          STRUCTURED_EVENT_TYPE="change"
          STRUCTURED_SEVERITY=""
          ROOT_CAUSE_CATEGORY=""
        fi

        STRUCTURED_KEY="${STRUCTURED_PREFIX}/${ENTRY_DATE}/${EVENT_ID}.json"

        # Structured entry — schema 1.0.0 per
        # alpha-engine-config/changelog/vocab.yaml. Carries the controlled-
        # vocab fields + git_refs + auto_emitted flag. Operator can later
        # annotate via `changelog-log` if root_cause_category needs filling
        # (incident path) or any field needs override.
        PR_URL_BUILT="$( [[ -n "${PR_NUMBER}" ]] && echo "https://github.com/${REPO}/pull/${PR_NUMBER}" || echo "" )"
        STRUCTURED_ENTRY=$(jq -n \
          --arg schema_version  "1.0.0" \
          --arg event_id        "${EVENT_ID}" \
          --arg ts_utc          "${TS_UTC}" \
          --arg event_type      "${STRUCTURED_EVENT_TYPE}" \
          --arg severity        "${STRUCTURED_SEVERITY}" \
          --arg subsystem       "${SUBSYSTEM}" \
          --arg root_cause      "${ROOT_CAUSE_CATEGORY}" \
          --arg resolution_type "${RESOLUTION_TYPE}" \
          --arg detected_at     "${TS_UTC}" \
          --arg resolved_at     "${TS_UTC}" \
          --arg verified_at     "${TS_UTC}" \
          --arg summary         "${PR_TITLE}" \
          --arg description     "${PR_BODY}" \
          --arg actor           "${ACTOR}" \
          --arg machine         "github-actions" \
          --arg source          "ci-deploy" \
          --arg deploy_status   "${DEPLOY_STATUS}" \
          --arg deploy_workflow "${DEPLOY_WORKFLOW}" \
          --arg workflow_run_id "${WORKFLOW_RUN_ID}" \
          --arg repo            "${REPO}" \
          --arg sha             "${SHA}" \
          --arg sha7            "${SHA7}" \
          --argjson pr_number   "${PR_NUMBER:-null}" \
          --arg pr_url          "${PR_URL_BUILT}" \
          --argjson files_changed "${FILES_CHANGED}" \
          '{
            schema_version: $schema_version,
            event_id: $event_id,
            ts_utc: $ts_utc,
            event_type: $event_type,
            severity: (if $severity == "" then null else $severity end),
            subsystem: $subsystem,
            root_cause_category: (if $root_cause == "" then null else $root_cause end),
            resolution_type: $resolution_type,
            started_at: null,
            detected_at: $detected_at,
            resolved_at: $resolved_at,
            verified_at: $verified_at,
            summary: $summary,
            description: $description,
            resolution_notes: null,
            actor: $actor,
            machine: $machine,
            source: $source,
            auto_emitted: true,
            git_refs: (if $pr_number == null then [{repo: $repo, sha: $sha}] else [{repo: $repo, sha: $sha, pr_number: $pr_number}] end),
            prompt_version: null,
            run_id: null,
            eval_run_ref: null,
            deploy: {
              status: $deploy_status,
              workflow: $deploy_workflow,
              workflow_run_id: $workflow_run_id,
              sha7: $sha7,
              pr_url: $pr_url,
              files_changed: $files_changed
            }
          }')

        echo "Structured entry (description truncated for log):"
        echo "${STRUCTURED_ENTRY}" | jq '.description |= (if length > 200 then .[:200] + "…" else . end)'
        echo
        echo "Structured key: s3://${S3_BUCKET}/${STRUCTURED_KEY}"

        echo "${STRUCTURED_ENTRY}" | aws s3 cp - "s3://${S3_BUCKET}/${STRUCTURED_KEY}" --content-type application/json
